name: Publish

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.19
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@^11.5.1
        
      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Npm
        run: npm -v && node -v

      - name: Debug OIDC & Package Info
        run: |
          echo "=== Current Branch ==="
          git branch --show-current
          
          echo "=== Workflow File ==="
          echo "${{ github.workflow }}"
          
          echo "=== Package Name ==="
          node -p "require('./package.json').name"
          
          echo "=== NPM Config ==="
          npm config list
          
          echo "=== Test OIDC Token Exchange ==="
          # 这会尝试用 OIDC token 换取 npm token，如果失败会直接报错
          NPM_CONFIG_PROVENANCE=true npm whoami --registry https://registry.npmjs.org/ || true

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public --loglevel verbose
